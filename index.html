<script>
fetch('projects/')
.then(() => {
  fetch('https://api.github.com/repos/arashfamiilirani/Portfolio/contents/projects')
  .then(res => res.json())
  .then(files => {
    const container = document.getElementById('projects');

    files.forEach(file => {
      if(file.name.endsWith('.json')) {
        fetch(file.download_url)
        .then(res => res.json())
        .then(p => {

          let embed = "";

          if (p.media_url.includes("youtube")) {
            embed = `<iframe src="${p.media_url.replace('watch?v=', 'embed/')}" allowfullscreen></iframe>`;
          } else if (p.media_url.includes("soundcloud")) {
            embed = `<iframe src="https://w.soundcloud.com/player/?url=${p.media_url}"></iframe>`;
          }

          const div = document.createElement('div');
          div.className = 'card';

          div.innerHTML = `
            <h3>${p.title}</h3>
            <p>${p.description}</p>
            ${embed}
          `;

          container.appendChild(div);
        });
      }
    });
  });
});
</script>

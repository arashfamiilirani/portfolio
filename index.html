<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root { --bg: #050505; --accent: #f1f704; --panel: rgba(20, 20, 22, 0.8); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; scroll-behavior: smooth; }
        
        /* THE STICKY HEADER */
        header { 
            position: sticky; top: 0; z-index: 1000; padding: 20px 5%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;
        }

        .container { max-width: 900px; margin: 60px auto; padding: 20px; display: flex; flex-direction: column; gap: 40px; }
        
        /* SECTION CARDS */
        .card { 
            background: var(--panel); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 24px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        h2 { color: var(--accent); margin-top: 0; font-size: 1.5rem; letter-spacing: -0.02em; }
        
        /* RICH TEXT EDITOR STYLES */
        .rich-text p { line-height: 1.7; color: #aaa; }
        .rich-text a { color: var(--accent); }
        .rich-text strong { color: #fff; }
        
        nav { display: flex; gap: 20px; flex-wrap: wrap; }
        nav a { color: #888; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: var(--accent); }
        
        iframe { width: 100%; border-radius: 12px; border: none; margin-top: 20px; background: #000; }
    </style>
</head>
<body>

<header>
    <h1 id="site-name">PORTFOLIO</h1>
    <nav id="auto-menu"></nav>
</header>

<main class="container" id="page-content"></main>

<script>
    async function loadSite() {
        try {
            const res = await fetch('/content/settings.json');
            const data = await res.json();

            // Set Color & Name
            if(data.accent) document.documentElement.style.setProperty('--accent', data.accent);
            if(data.site_name) document.getElementById('site-name').textContent = data.site_name;

            const menu = document.getElementById('auto-menu');
            const content = document.getElementById('page-content');

            // Build the Page and Menu Automatically
            (data.sections || []).forEach((section, index) => {
                const sectionId = 'section-' + index;

                // 1. Add to the Sticky Menu (if it has a title)
                if(section.title) {
                    menu.innerHTML += `<a href="#${sectionId}">${section.title}</a>`;
                }

                // 2. Add the Content to the Page
                let html = `<section class="card" id="${sectionId}">`;
                if (section.title) html += `<h2>${section.title}</h2>`;
                
                // This 'marked.parse' makes your Rich Text editor actually work
                if (section.body) html += `<div class="rich-text">${marked.parse(section.body)}</div>`; 
                
                if (section.media_link) html += `<iframe src="${section.media_link}" height="350"></iframe>`;
                html += `</section>`;

                content.innerHTML += html;
            });

        } catch(e) { console.log("Site ready to be configured via dashboard."); }
    }
    loadSite();
</script>

</body>
</html>

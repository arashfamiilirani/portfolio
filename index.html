<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #000; --text: #fff; --dim: #555; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; font-weight: 200; }
        header { position: fixed; top: 0; width: 100%; padding: 40px; z-index: 1000; mix-blend-mode: difference; }
        .logo { font-size: 0.8rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 600; }
        .container { max-width: 1200px; margin: 0 auto; padding: 200px 40px; }
        .module { margin-bottom: 150px; }
        .about_module h1 { font-size: clamp(3rem, 8vw, 5rem); font-weight: 200; margin-bottom: 40px; }
        .about_module p { font-size: 1.4rem; line-height: 1.8; color: #aaa; max-width: 800px; }
        .grid { display: grid; gap: 60px; }
        .cols-2 { grid-template-columns: 1fr 1fr; }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; filter: grayscale(1); transition: 0.5s; background: #080808; }
        iframe:hover { filter: grayscale(0); }
        .caption { font-size: 0.6rem; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; margin-top: 15px; }
    </style>
</head>
<body>
    <header><div class="logo" id="logo-text">PORTFOLIO</div></header>
    <main class="container" id="content-modules"></main>
    <script>
        async function init() {
            const res = await fetch('/content/settings.json');
            const data = await res.json();
            document.getElementById('logo-text').textContent = data.site_name;
            const content = document.getElementById('content-modules');
            (data.modules || []).forEach(m => {
                const section = document.createElement('section');
                section.className = `module ${m.type}`;
                if (m.type === 'about_module') {
                    section.innerHTML = `<div>${marked.parse(m.body || '')}</div>`;
                } else if (m.type === 'video_module') {
                    const items = (m.items || []).map(v => `<div><iframe src="${v.url}"></iframe><div class="caption">${v.caption || ''}</div></div>`).join('');
                    section.innerHTML = `<div class="grid ${m.cols == '2' ? 'cols-2' : ''}">${items}</div>`;
                } else if (m.type === 'audio_module') {
                    const tracks = (m.items || []).map(t => `<iframe width="100%" height="166" src="${t.url}"></iframe>`).join('');
                    section.innerHTML = `<div>${tracks}</div>`;
                }
                content.appendChild(section);
            });
        }
        init();
    </script>
</body>
</html>

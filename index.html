<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #080808; --text: #ffffff; --dim: #777; }
        
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; margin: 0; 
            line-height: 1.6; -webkit-font-smoothing: antialiased;
        }

        /* YULIA MAHR STYLE HEADER */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 30px 50px; display: flex; justify-content: space-between;
            align-items: center; background: rgba(8,8,8,0.9);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        .logo { font-size: 0.85rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 600; }
        nav { display: flex; gap: 40px; }
        nav a { color: var(--dim); text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        nav a:hover { color: #fff; }

        /* CONTENT CANVAS */
        .container { max-width: 1400px; margin: 0 auto; padding: 180px 50px 100px; }
        
        .section { margin-bottom: 180px; width: 100%; }
        
        /* TYPOGRAPHY MODULE */
        .editorial-text { max-width: 900px; margin-bottom: 60px; }
        .editorial-text h2 { font-size: 3.5rem; font-weight: 200; letter-spacing: -0.04em; margin-bottom: 40px; line-height: 1.1; }
        .editorial-text .body-content { font-size: 1.15rem; font-weight: 300; color: #ccc; line-height: 1.8; }
        .center { margin-left: auto; margin-right: auto; text-align: center; }

        /* MEDIA MODULE */
        .gallery { display: grid; gap: 60px; width: 100%; }
        .cols-1 { grid-template-columns: 1fr; }
        .cols-2 { grid-template-columns: 1fr 1fr; }
        
        .media-item { width: 100%; }
        .media-item iframe { width: 100%; aspect-ratio: 16/9; border: none; background: #000; }
        .caption { margin-top: 15px; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); }

        @media (max-width: 800px) {
            header { padding: 20px; flex-direction: column; gap: 15px; }
            .editorial-text h2 { font-size: 2.2rem; }
            .cols-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" id="site-logo">PORTFOLIO</div>
    <nav id="main-nav"></nav>
</header>

<main class="container" id="content-root"></main>

<script>
    async function init() {
        try {
            const res = await fetch('/content/settings.json');
            const data = await res.json();
            
            if(data.site_name) document.getElementById('site-logo').textContent = data.site_name;

            const nav = document.getElementById('main-nav');
            const root = document.getElementById('content-root');

            (data.modules || []).forEach((m, i) => {
                const id = 'sec-' + i;
                
                // Add to Nav
                if(m.menu_title) nav.innerHTML += `<a href="#${id}">${m.menu_title}</a>`;

                // Create Section
                const div = document.createElement('div');
                div.className = 'section';
                div.id = id;

                if(m.type === 'text_block') {
                    div.innerHTML = `
                        <div class="editorial-text ${m.align === 'Center' ? 'center' : ''}">
                            ${m.heading ? `<h2>${m.heading}</h2>` : ''}
                            <div class="body-content">${marked.parse(m.body || '')}</div>
                        </div>`;
                } else if(m.type === 'media_block') {
                    let itemsHtml = (m.items || []).map(item => `
                        <div class="media-item">
                            <iframe src="${item.url}" style="${item.url.includes('soundcloud') ? 'height:166px; aspect-ratio:auto;' : ''}"></iframe>
                            ${item.caption ? `<div class="caption">${item.caption}</div>` : ''}
                        </div>`).join('');
                    
                    div.innerHTML = `<div class="gallery cols-${m.cols}">${itemsHtml}</div>`;
                }
                
                root.appendChild(div);
            });
        } catch(e) { console.error(e); }
    }
    init();
</script>
</body>
</html>

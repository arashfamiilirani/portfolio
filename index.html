<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Arash Famiilirani</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --accent: #000000;
            --heading-font: 'Cormorant Garamond', serif;
            --body-font: 'Inter', sans-serif;
            --heading-size: 4.5rem;
            --body-font-size: 1.2rem;
            --header-height: 60px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--body-font);
            font-weight: 300;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            font-size: var(--body-font-size);
        }
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--bg);
            padding: 0.6rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            z-index: 100;
        }
        .site-title {
            font-family: var(--heading-font);
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: var(--text);
            text-decoration: none;
            cursor: pointer;
        }
        .nav-links {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .nav-links a {
            font-family: var(--body-font);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
            padding: 0.4rem 0;
            display: inline-block;
        }
        .nav-links a:hover {
            color: var(--accent);
        }
        .social-icons {
            display: flex;
            gap: 0.8rem;
            margin-left: 1rem;
        }
        .social-icons a {
            font-size: 1.1rem;
            color: var(--text);
            text-decoration: none;
            padding: 0.4rem;
        }
        .hero {
            position: relative;
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .hero img, .hero video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: var(--hero-fit);
            object-position: var(--hero-align);
        }
        .hero .credit {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            font-size: 0.7rem;
            color: white;
            text-shadow: 0 0 4px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.5);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            z-index: 2;
        }
        .scroll-content {
            position: relative;
            background: var(--bg);
            z-index: 10;
            transition: margin-top 0.2s ease;
        }
        .scroll-content.with-margin {
            margin-top: calc(var(--header-height));
        }
        .main-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem 4rem;
        }
        .section {
            display: none;
            animation: fadeIn 0.3s ease;
            scroll-margin-top: calc(var(--header-height) + 20px);
        }
        .section.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .text h1 {
            font-size: var(--heading-size);
            line-height: 1.1;
            margin: 2rem 0 1rem;
        }
        .text p {
            font-size: var(--body-font-size);
            line-height: 1.6;
            margin-bottom: 1.5rem;
            max-width: 85%;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .video-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .video-item iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            background: #f0f0f0;
        }
        .audio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .audio-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .audio-item iframe {
            width: 100%;
            height: 166px;
            border: none;
        }
        .caption {
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text);
            opacity: 0.7;
            margin-top: 0.5rem;
        }
        .contact-form {
            margin-top: 1rem;
        }
        .contact-form label {
            display: block;
            margin-top: 1rem;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.25rem;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 4px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--body-font);
        }
        .contact-form button {
            margin-top: 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--body-font);
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .contact-form button:hover {
            opacity: 0.8;
        }
        .form-status {
            margin-top: 1rem;
            font-size: 0.9rem;
        }
        .site-footer {
            border-top: 1px solid rgba(0,0,0,0.1);
            padding: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text);
            opacity: 0.7;
        }
        @media (max-width: 768px) {
            .site-header { flex-direction: column; gap: 0.4rem; text-align: center; padding: 0.6rem 1rem; }
            .nav-links { justify-content: center; gap: 0.8rem; }
            .social-icons { margin-left: 0; justify-content: center; }
            .text p { max-width: 100%; }
            .text h1 { font-size: calc(var(--heading-size) * 0.7); }
            .video-grid, .audio-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="site-title" id="logo-text">ARASH FAMIILIRANI</div>
        <div class="nav-links" id="nav-links"></div>
        <div class="social-icons" id="social-icons"></div>
    </header>
    <div class="hero" id="hero-section"></div>
    <div class="scroll-content" id="scroll-content">
        <main class="main-content" id="main-content"></main>
        <footer class="site-footer" id="footer"></footer>
    </div>

    <script>
        // Convert YouTube watch/shorts to embed URL
        function convertYouTubeUrl(url) {
            if (!url) return url;
            if (url.includes('/embed/') || url.includes('youtube.com/embed/')) return url;
            if (url.includes('youtu.be/')) {
                const id = url.split('youtu.be/')[1].split('?')[0];
                return `https://www.youtube.com/embed/${id}`;
            }
            if (url.includes('watch?v=')) {
                const id = url.split('v=')[1].split('&')[0];
                return `https://www.youtube.com/embed/${id}`;
            }
            if (url.includes('/shorts/')) {
                const id = url.split('/shorts/')[1].split('?')[0];
                return `https://www.youtube.com/embed/${id}`;
            }
            return url;
        }

        // Convert SoundCloud track URL to embed widget URL
        function convertSoundCloudUrl(url) {
            if (!url) return url;
            // If it's already an embed URL or widget URL, return as is
            if (url.includes('w.soundcloud.com/player') || url.includes('embed')) return url;
            // If it's a regular SoundCloud track URL (e.g., https://soundcloud.com/user/track)
            if (url.includes('soundcloud.com/') && !url.includes('/sets/')) {
                // Encode the URL and use the widget endpoint
                const encodedUrl = encodeURIComponent(url);
                return `https://w.soundcloud.com/player/?url=${encodedUrl}&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&visual=true`;
            }
            // If it's a set/playlist
            if (url.includes('/sets/')) {
                const encodedUrl = encodeURIComponent(url);
                return `https://w.soundcloud.com/player/?url=${encodedUrl}&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&visual=true`;
            }
            return url;
        }

        async function buildSite() {
            try {
                const res = await fetch('/content/settings.json');
                if (!res.ok) throw new Error('Settings not found');
                const data = await res.json();

                // Apply theme
                if (data.theme) {
                    const root = document.documentElement.style;
                    if (data.theme.bg) root.setProperty('--bg', data.theme.bg);
                    if (data.theme.text) root.setProperty('--text', data.theme.text);
                    if (data.theme.accent) root.setProperty('--accent', data.theme.accent);
                    if (data.theme.heading_font) root.setProperty('--heading-font', data.theme.heading_font);
                    if (data.theme.body_font) root.setProperty('--body-font', data.theme.body_font);
                    if (data.theme.heading_size) root.setProperty('--heading-size', data.theme.heading_size);
                    if (data.theme.body_font_size) root.setProperty('--body-font-size', data.theme.body_font_size);
                }

                // Site name
                const siteName = data.site_name || 'ARASH FAMIILIRANI';
                document.getElementById('logo-text').textContent = siteName;

                // Social icons
                const social = data.social_links || {};
                const socialContainer = document.getElementById('social-icons');
                const socialLinks = [];
                if (social.instagram) socialLinks.push(`<a href="${social.instagram}" target="_blank"><i class="fab fa-instagram"></i></a>`);
                if (social.youtube) socialLinks.push(`<a href="${social.youtube}" target="_blank"><i class="fab fa-youtube"></i></a>`);
                if (social.soundcloud) socialLinks.push(`<a href="${social.soundcloud}" target="_blank"><i class="fab fa-soundcloud"></i></a>`);
                if (social.spotify) socialLinks.push(`<a href="${social.spotify}" target="_blank"><i class="fab fa-spotify"></i></a>`);
                if (social.email) socialLinks.push(`<a href="mailto:${social.email}"><i class="fas fa-envelope"></i></a>`);
                socialContainer.innerHTML = socialLinks.join('');

                // Copyright
                const currentYear = new Date().getFullYear();
                document.getElementById('footer').innerHTML = `<p>© ${currentYear} Arash Famiilirani. All rights reserved.</p>`;

                // Hero
                const hero = data.hero || {};
                const heroContainer = document.getElementById('hero-section');
                const heroType = hero.type || 'image';

                if (heroType === 'video' && hero.video) {
                    heroContainer.innerHTML = `
                        <video autoplay loop muted playsinline>
                            <source src="${hero.video}" type="video/mp4">
                        </video>
                        ${hero.credit ? `<div class="credit">${hero.credit}</div>` : ''}
                    `;
                    heroContainer.style.cssText = `
                        width: ${hero.width || '100%'};
                        height: ${hero.height || '100vh'};
                    `;
                    heroContainer.style.setProperty('--hero-fit', hero.fit || 'cover');
                    heroContainer.style.setProperty('--hero-align', hero.alignment || 'center');
                } else if (hero.image) {
                    heroContainer.innerHTML = `
                        <img src="${hero.image}" alt="Hero">
                        ${hero.credit ? `<div class="credit">${hero.credit}</div>` : ''}
                    `;
                    heroContainer.style.cssText = `
                        width: ${hero.width || '100%'};
                        height: ${hero.height || '100vh'};
                    `;
                    heroContainer.style.setProperty('--hero-fit', hero.fit || 'cover');
                    heroContainer.style.setProperty('--hero-align', hero.alignment || 'center');
                } else {
                    heroContainer.innerHTML = '';
                }

                // Sections
                const sections = data.sections || [];
                const mainContainer = document.getElementById('main-content');
                mainContainer.innerHTML = '';

                const sectionsData = [];

                sections.forEach((section, idx) => {
                    const sectionId = `section-${idx}`;
                    let contentHtml = '';
                    let title = section.title || 'Untitled';

                    if (section.type === 'text') {
                        contentHtml = marked.parse(section.body || '');
                    } 
                    else if (section.type === 'video_grid') {
                        const videos = section.videos || [];
                        const layout = section.layout === 'list' ? 'video-list' : 'video-grid';
                        const videoWidth = section.width || '100%';
                        const gridStyle = layout === 'video-grid' ? `grid-template-columns: repeat(auto-fill, minmax(${videoWidth === '100%' ? '300px' : videoWidth}, 1fr));` : '';
                        contentHtml = `
                            <h2>${section.title}</h2>
                            <div class="${layout}" style="${gridStyle}">
                                ${videos.map(v => `
                                    <div class="video-item">
                                        <iframe src="${convertYouTubeUrl(v.url)}" frameborder="0" allowfullscreen></iframe>
                                        ${v.caption ? `<div class="caption">${v.caption}</div>` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }
                    else if (section.type === 'audio_grid') {
                        const tracks = section.tracks || [];
                        const layout = section.layout === 'list' ? 'audio-list' : 'audio-grid';
                        const audioWidth = section.width || '100%';
                        const gridStyle = layout === 'audio-grid' ? `grid-template-columns: repeat(auto-fill, minmax(${audioWidth === '100%' ? '300px' : audioWidth}, 1fr));` : '';
                        contentHtml = `
                            <h2>${section.title}</h2>
                            <div class="${layout}" style="${gridStyle}">
                                ${tracks.map(t => `
                                    <div class="audio-item">
                                        <iframe src="${convertSoundCloudUrl(t.url)}" frameborder="0" scrolling="no"></iframe>
                                        ${t.caption ? `<div class="caption">${t.caption}</div>` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }
                    else if (section.type === 'contact') {
                        contentHtml = `
                            <h2>${section.title}</h2>
                            ${section.text ? marked.parse(section.text) : ''}
                            <div class="contact-form">
                                <form id="contact-form-${idx}" action="https://formspree.io/f/xreobwzr" method="POST">
                                    <label>Name</label>
                                    <input type="text" name="name" required>
                                    <label>Email</label>
                                    <input type="email" name="_replyto" required>
                                    <label>Message</label>
                                    <textarea name="message" rows="5" required></textarea>
                                    <button type="submit">Send</button>
                                    <div class="form-status" id="form-status-${idx}"></div>
                                </form>
                            </div>
                        `;
                        setTimeout(() => {
                            const form = document.getElementById(`contact-form-${idx}`);
                            const status = document.getElementById(`form-status-${idx}`);
                            if (form) {
                                form.addEventListener('submit', async (e) => {
                                    e.preventDefault();
                                    const formData = new FormData(form);
                                    try {
                                        const response = await fetch(form.action, {
                                            method: 'POST',
                                            body: formData,
                                            headers: { 'Accept': 'application/json' }
                                        });
                                        if (response.ok) {
                                            status.innerHTML = '<p style="color: green;">Message sent! Thank you.</p>';
                                            form.reset();
                                        } else {
                                            status.innerHTML = '<p style="color: red;">Oops! Something went wrong.</p>';
                                        }
                                    } catch (err) {
                                        status.innerHTML = '<p style="color: red;">Network error. Please try again.</p>';
                                    }
                                });
                            }
                        }, 0);
                    }

                    const sectionDiv = document.createElement('div');
                    sectionDiv.id = sectionId;
                    sectionDiv.className = `section ${section.type}`;
                    sectionDiv.innerHTML = contentHtml;
                    mainContainer.appendChild(sectionDiv);
                    sectionsData.push({ id: sectionId, title: title });
                });

                // Navigation – only custom sections (no Home tab)
                const navContainer = document.getElementById('nav-links');
                navContainer.innerHTML = sectionsData.map(item => `<a data-section="${item.id}">${item.title}</a>`).join('');

                // Click handler for logo (acts as Home)
                const logo = document.querySelector('.site-title');
                const heroElem = document.getElementById('hero-section');
                const sectionsElements = document.querySelectorAll('.section');
                const scrollContent = document.getElementById('scroll-content');

                // Set header height for CSS variables and dynamic margin
                function setHeaderHeight() {
                    const header = document.querySelector('.site-header');
                    const height = header.offsetHeight;
                    document.documentElement.style.setProperty('--header-height', height + 'px');
                }
                setHeaderHeight();
                window.addEventListener('resize', setHeaderHeight);

                logo.addEventListener('click', () => {
                    heroElem.style.display = 'block';
                    sectionsElements.forEach(s => s.classList.remove('active'));
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    scrollContent.classList.remove('with-margin');
                });

                // Click handlers for section tabs
                document.querySelectorAll('.nav-links a').forEach(link => {
                    link.addEventListener('click', (e) => {
                        const targetId = link.getAttribute('data-section');
                        heroElem.style.display = 'none';
                        sectionsElements.forEach(s => s.classList.remove('active'));
                        const activeSection = document.getElementById(targetId);
                        if (activeSection) {
                            activeSection.classList.add('active');
                            scrollContent.classList.add('with-margin');
                            activeSection.scrollIntoView({ behavior: 'smooth' });
                        }
                    });
                });

                // Initial state: show hero, hide all sections, no margin
                heroElem.style.display = 'block';
                sectionsElements.forEach(s => s.classList.remove('active'));
                scrollContent.classList.remove('with-margin');

            } catch (err) {
                console.warn('Awaiting CMS publish…', err);
                document.getElementById('main-content').innerHTML = '<p style="color: #888;">Content will appear after you publish from the admin panel.</p>';
            }
        }
        buildSite();
    </script>
</body>
</html>

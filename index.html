<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
    :root { 
        --bg: #000000; 
        --text: #ffffff; 
        --dim: #555555; 
        --accent: #888888;
    }

    body { 
        background-color: var(--bg); 
        color: var(--text); 
        font-family: 'Inter', -apple-system, sans-serif; 
        margin: 0; 
        font-weight: 200; 
        -webkit-font-smoothing: antialiased;
    }

    /* Minimalist Floating Navigation */
    header { 
        position: fixed; top: 0; width: 100%; padding: 50px; 
        display: flex; justify-content: space-between; z-index: 1000;
        letter-spacing: 5px; text-transform: uppercase; font-size: 0.7rem;
    }
    .logo { font-weight: 600; opacity: 0.8; }

    /* The Main Canvas */
    .container { 
        max-width: 1400px; 
        margin: 0 auto; 
        padding: 250px 50px 100px; 
    }

    /* Yulia Mahr Style Heading */
    h1 { 
        font-size: clamp(3rem, 8vw, 6rem); /* Responsive massive text */
        font-weight: 200; 
        letter-spacing: -0.05em; 
        line-height: 0.9; 
        margin-bottom: 80px; 
        max-width: 1000px;
    }

    /* Editorial Bio */
    .bio-content { 
        font-size: 1.4rem; 
        line-height: 1.7; 
        color: #999; 
        max-width: 750px; 
        margin-bottom: 180px; /* Massive gap before work starts */
    }

    /* The Work Grid */
    .work-grid { 
        display: grid; 
        grid-template-columns: 1fr; /* Single column for focus */
        gap: 150px; /* Dramatic spacing between projects */
    }

    .work-item { width: 100%; position: relative; }

    /* Grayscale Video Previews */
    .work-item iframe { 
        width: 100%; 
        aspect-ratio: 16/9; 
        border: none; 
        background: #080808; 
        filter: grayscale(1) contrast(1.1); /* The "noir" look */
        transition: filter 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .work-item iframe:hover { 
        filter: grayscale(0) contrast(1); 
    }

    /* Tiny, spaced-out captions */
    .caption { 
        margin-top: 25px; 
        font-size: 0.65rem; 
        text-transform: uppercase; 
        letter-spacing: 4px; 
        color: var(--dim); 
    }

    @media (max-width: 768px) {
        header { padding: 20px; }
        .container { padding: 150px 20px; }
        h1 { font-size: 3rem; }
    }
</style>
</head>
<body>
    <header><div class="logo" id="site-logo">PORTFOLIO</div></header>

    <main class="container">
        <h1 id="main-heading"></h1>
        <div class="bio-content" id="bio-text"></div>
        <div class="work-grid" id="project-list"></div>
    </main>

    <script>
        async function loadPortfolio() {
    try {
        const response = await fetch('/content/settings.json');
        const data = await response.json();
        
        document.getElementById('site-logo').textContent = data.site_name || "ARASH IRANI";
        document.getElementById('main-heading').textContent = data.heading || "";
        document.getElementById('bio-text').innerHTML = marked.parse(data.bio || "");

        const grid = document.getElementById('project-list');
        (data.projects || []).forEach(p => {
            // Soundcloud looks better at a fixed height, videos need 16/9
            const isAudio = p.url.includes('soundcloud.com');
            const frameStyles = isAudio ? 'height: 166px; aspect-ratio: auto;' : '';
            
            grid.innerHTML += `
                <div class="work-item">
                    <iframe src="${p.url}" style="${frameStyles}" allow="autoplay"></iframe>
                    <div class="caption">${p.title || ''}</div>
                </div>`;
        });
    } catch (e) { console.error("Could not load content."); }
}
loadPortfolio();
    </script>
</body>
</html>

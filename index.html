<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #000; --text: #fff; --dim: #666; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; font-weight: 200; }
        
        /* The Missing Menu Header */
        header { 
            position: fixed; top: 0; width: 100%; padding: 40px; 
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; mix-blend-mode: difference;
        }
        .logo { font-size: 0.8rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 600; }
        nav { display: flex; gap: 30px; }
        nav a { color: var(--text); text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }
        nav a:hover { opacity: 1; }

        .container { max-width: 1400px; margin: 0 auto; padding: 180px 40px 100px; }

        /* Module Styling */
        .module { margin-bottom: 180px; }
        
        .text-block.center { text-align: center; margin: 0 auto; }
        .text-block h2 { font-size: 4.5rem; font-weight: 200; line-height: 1; margin-bottom: 40px; letter-spacing: -0.03em; }
        .text-block div { font-size: 1.3rem; line-height: 1.8; color: #aaa; max-width: 800px; }
        .text-block.center div { margin: 0 auto; }

        .media-grid { display: grid; gap: 40px; }
        .cols-1 { grid-template-columns: 1fr; }
        .cols-2 { grid-template-columns: 1fr 1fr; }
        
        iframe { width: 100%; aspect-ratio: 16/9; border: none; filter: grayscale(1); transition: 0.6s; }
        iframe:hover { filter: grayscale(0); }
        .media-label { font-size: 0.6rem; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; margin-top: 15px; }
    </style>
</head>
<body>
    <header>
        <div class="logo" id="logo-text">ARASH IRANI</div>
        <nav id="nav-menu"></nav>
    </header>

    <main class="container" id="content-modules"></main>

    <script>
        <script>
    async function loadSite() {
        const res = await fetch('/content/settings.json');
        const data = await res.json();
        document.getElementById('logo-text').textContent = data.site_name;

        const container = document.getElementById('content-modules');

        (data.modules || []).forEach(m => {
            const section = document.createElement('section');
            section.className = `module ${m.type}`;

            if (m.type === 'about_module') {
                section.innerHTML = `<h2>${m.title}</h2><div>${marked.parse(m.body)}</div>`;
            } 
            
            else if (m.type === 'video_module') {
                const videos = m.items.map(v => `
                    <div class="media-item">
                        <iframe src="${v.url}" frameborder="0" allowfullscreen></iframe>
                        <p>${v.caption || ''}</p>
                    </div>`).join('');
                section.innerHTML = `<div class="grid cols-${m.cols}">${videos}</div>`;
            }

            else if (m.type === 'audio_module') {
                const tracks = m.items.map(t => `
                    <div class="audio-item">
                        <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="${t.url}"></iframe>
                        <p>${t.title || ''}</p>
                    </div>`).join('');
                section.innerHTML = `<div class="audio-list">${tracks}</div>`;
            }

            else if (m.type === 'photo_module') {
                const imgs = m.photos.map(p => `<img src="${p.image}" alt="${p.alt}">`).join('');
                section.innerHTML = `<div class="photo-grid">${imgs}</div>`;
            }

            else if (m.type === 'contact_module') {
                section.innerHTML = `
                    <div class="contact">
                        <a href="mailto:${m.email}">Email</a>
                        <a href="${m.insta_url}" target="_blank">Instagram</a>
                    </div>`;
            }

            container.appendChild(section);
        });
    }
    loadSite();
</script>
    </script>
</body>
</html>

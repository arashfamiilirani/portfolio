<script>
fetch('projects/projects.json')
.then(res => res.json())
.then(data => {
  const container = document.getElementById('projects');

  data.forEach(p => {

    let embed = "";

    if (p.media_url.includes("youtube")) {
      embed = `<iframe src="${p.media_url.replace('watch?v=', 'embed/')}" allowfullscreen></iframe>`;
    } 
    else if (p.media_url.includes("soundcloud")) {
      embed = `<iframe src="https://w.soundcloud.com/player/?url=${p.media_url}"></iframe>`;
    }

    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <h3>${p.title}</h3>
      <p>${p.description}</p>
      ${embed}
    `;

    container.appendChild(div);
  });
})
.catch(err => {
  document.body.innerHTML = "<h1 style='color:white'>Error loading projects</h1>";
  console.error(err);
});
</script>

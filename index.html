<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #000; --text: #fff; --dim: #666; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; font-weight: 200; }
        
        /* Minimalist Navigation */
        header { 
            position: fixed; top: 0; width: 100%; padding: 40px; 
            display: flex; justify-content: space-between; z-index: 1000;
        }
        .logo { font-size: 0.8rem; letter-spacing: 6px; text-transform: uppercase; font-weight: 600; }

        /* Cinematic Layout */
        .container { max-width: 1200px; margin: 0 auto; padding: 200px 40px; }
        
        h1 { font-size: 5rem; font-weight: 200; letter-spacing: -0.05em; margin-bottom: 40px; line-height: 1; }
        .bio { font-size: 1.3rem; line-height: 1.8; color: #ccc; max-width: 800px; margin-bottom: 120px; }

        /* Video Grid */
        .work-grid { display: grid; grid-template-columns: 1fr; gap: 80px; }
        .work-item iframe { width: 100%; aspect-ratio: 16/9; border: none; }
        .work-item p { margin-top: 15px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--dim); }

        @media (max-width: 800px) { h1 { font-size: 3rem; } }
    </style>
</head>
<body>
    <header><div class="logo" id="logo-text">ARASH IRANI</div></header>

    <main class="container">
        <h1 id="main-heading"></h1>
        <div class="bio" id="bio-text"></div>
        <div class="work-grid" id="work-grid"></div>
    </main>

    <script>
        async function load() {
            try {
                const res = await fetch('/content/settings.json');
                const data = await res.json();
                
                document.getElementById('logo-text').textContent = data.site_name || "ARASH IRANI";
                document.getElementById('main-heading').textContent = data.heading || "";
                document.getElementById('bio-text').innerHTML = marked.parse(data.bio || "");

                const grid = document.getElementById('work-grid');
                (data.projects || []).forEach(p => {
                    grid.innerHTML += `
                        <div class="work-item">
                            <iframe src="${p.url}"></iframe>
                            <p>${p.title || ''}</p>
                        </div>`;
                });
            } catch(e) { console.log("No data yet."); }
        }
        load();
    </script>
</body>
</html>

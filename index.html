<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arash Irani | Sound Artist & Designer</title>
    <style>
  /* 1. PROFESSIONAL STUDIO THEME */
  :root {
    --bg: #050505;
    --card-bg: #111;
    --accent: #00ffcc; /* This will be overridden by your Dashboard color picker */
    --text: #ececec;
    --font-main: 'Inter', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    line-height: 1.6;
    margin: 0;
    padding: 0;
  }

  /* 2. NAVIGATION BAR (Sophisticated & Clean) */
  nav {
    position: sticky;
    top: 0;
    background: rgba(5, 5, 5, 0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #222;
    padding: 20px 5vw;
    z-index: 1000;
  }
  
  nav ul {
    display: flex;
    gap: 40px;
    list-style: none;
    margin: 0;
    padding: 0;
  }

  nav a {
    color: var(--text);
    text-decoration: none;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: color 0.3s;
  }

  nav a:hover {
    color: var(--accent);
  }

  /* 3. SECTION SPACING */
  section {
    padding: 100px 5vw;
    border-bottom: 1px solid #111;
  }

  h2 {
    font-family: var(--font-mono);
    font-size: 1.5rem;
    color: var(--accent);
    margin-bottom: 50px;
    text-transform: uppercase;
  }

  /* 4. PHOTOGRAPHY GRID */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  .photo-card img {
    width: 100%;
    height: auto;
    filter: grayscale(100%);
    transition: 0.5s ease;
  }

  .photo-card:hover img {
    filter: grayscale(0%);
    transform: scale(1.02);
  }
</style>
</head>
<body>
    <header>
        <nav>
  <ul style="display: flex; gap: 30px; list-style: none; padding: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;">
    <li><a href="#sound" style="color: inherit; text-decoration: none;">Sound</a></li>
    <li><a href="#photo" style="color: inherit; text-decoration: none;">Photography</a></li>
    <li><a href="#about" style="color: inherit; text-decoration: none;">Bio & CV</a></li>
  </ul>
</nav>
        <div>
            <h1>ARASH IRANI</h1>
            <span class="subtitle">Sound Artist / Composer / Audio Engineer</span>
        </div>
        <span class="subtitle">Montreal, QC</span>
    </header>

    <div class="grid">
        <div class="card">
            <span class="tag">Sound Design</span>
            <h3>Atmospheric Space Ambience</h3>
            <p class="subtitle">High-fidelity 96kHz 24-bit soundscape for interactive media.</p>
            <iframe height="160" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/YOUR_ID&color=%23000000"></iframe>
        </div>
    </div>
    <script>
  async function loadSiteSettings() {
    try {
      const response = await fetch('/content/settings.json');
      const settings = await response.json();
      
      // 1. Update the Title
      document.title = settings.site_title || "Arash Irani - Sound Artist";
      
      // 2. Apply Colors to CSS Variables
      const root = document.documentElement;
      if (settings.bg_color) root.style.setProperty('--bg', settings.bg_color);
      if (settings.accent_color) root.style.setProperty('--accent', settings.accent_color);
      if (settings.text_color) root.style.setProperty('--text', settings.text_color);
      
      // 3. Inject Custom "Coding" from the Dashboard
      if (settings.custom_css) {
        const styleTag = document.createElement('style');
        styleTag.textContent = settings.custom_css;
        document.head.appendChild(styleTag);
      }
    } catch (e) {
      console.log("No settings found yet, using defaults.");
    }
  }
  loadSiteSettings();
</script>
</body>
</html>

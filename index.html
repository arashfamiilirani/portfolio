<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arash Irani | Sound Artist & Designer</title>
    <style>
    :root { 
        --bg: #0a0a0a; 
        --card: #121212; 
        --accent: #0088ff; /* A clean studio blue */
        --text: #d1d1d1; 
    }
    body { 
        background: var(--bg); 
        color: #fff; 
        font-family: 'Courier New', monospace; /* Tech/Studio vibe */
        margin: 0; 
        padding: 5vw; 
    }
    header { 
        border-bottom: 1px solid #222; 
        margin-bottom: 60px; 
        padding-bottom: 20px; 
    }
    .grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); 
        gap: 40px; 
    }
    .card { 
        background: var(--card); 
        border: 1px solid #1a1a1a; 
        padding: 24px; 
        transition: 0.3s; 
    }
    .card:hover { 
        border-color: var(--accent); 
    }
    iframe { 
        width: 100%; 
        border: none; 
        margin-top: 15px; 
        aspect-ratio: 16/9; 
    }
</style>
</head>
<body>
    <header>
        <div>
            <h1>ARASH IRANI</h1>
            <span class="subtitle">Sound Artist / Composer / Audio Engineer</span>
        </div>
        <span class="subtitle">Montreal, QC</span>
    </header>

    <div class="grid">
        <div class="card">
            <span class="tag">Sound Design</span>
            <h3>Atmospheric Space Ambience</h3>
            <p class="subtitle">High-fidelity 96kHz 24-bit soundscape for interactive media.</p>
            <iframe height="160" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/YOUR_ID&color=%23000000"></iframe>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arash Irani</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; font-weight: 200; }
        header { position: fixed; top: 0; width: 100%; padding: 40px; z-index: 100; }
        .logo { font-size: 0.8rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 600; }
        .container { max-width: 1100px; margin: 0 auto; padding: 180px 40px; }
        h1 { font-size: 4rem; font-weight: 200; letter-spacing: -0.04em; margin-bottom: 40px; }
        .bio { font-size: 1.2rem; line-height: 1.8; color: #aaa; max-width: 700px; margin-bottom: 80px; }
        .grid { display: grid; gap: 60px; }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; background: #111; }
        .caption { margin-top: 10px; font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <header><div class="logo" id="site-title">ARASH IRANI</div></header>
    <main class="container">
        <h1 id="main-heading"></h1>
        <div class="bio" id="bio-content"></div>
        <div id="project-grid" class="grid"></div>
    </main>
    <script>
        fetch('/content/settings.json').then(res => res.json()).then(data => {
            document.getElementById('site-title').textContent = data.site_name || "ARASH IRANI";
            document.getElementById('main-heading').textContent = data.heading || "";
            document.getElementById('bio-content').innerHTML = marked.parse(data.bio || "");
            const grid = document.getElementById('project-grid');
            (data.projects || []).forEach(p => {
                grid.innerHTML += `<div><iframe src="${p.url}"></iframe><div class="caption">${p.title}</div></div>`;
            });
        });
    </script>
</body>
</html>

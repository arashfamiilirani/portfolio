<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arash Irani | Sound Artist & Designer</title>
    <style>
  :root {
    --bg: #000000;
    --panel: rgba(28, 28, 30, 0.7); /* Apple "Dark Mode" Panel Color */
    --accent: #0071e3; /* Classic Apple Blue */
    --text-main: #f5f5f7;
    --text-dim: #86868b;
    --glass-border: rgba(255, 255, 255, 0.1);
  }

  body {
    background-color: var(--bg);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }

  /* THE NAV PANEL (Apple-style Header) */
  nav {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 600px;
    background: var(--panel);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 30px;
    padding: 10px 20px;
    z-index: 1000;
    display: flex;
    justify-content: space-around;
  }

  nav a {
    color: var(--text-main);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.01em;
    opacity: 0.8;
    transition: 0.3s;
  }

  nav a:hover { opacity: 1; color: var(--accent); }

  /* THE BENTO GRID (The Professional Panel Layout) */
  .container {
    padding-top: 120px;
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 20px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--glass-border);
    border-radius: 22px; /* Precision Apple curve */
    padding: 30px;
    position: relative;
    overflow: hidden;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card:hover {
    transform: scale(1.02);
  }

  /* Sizing the Panels (Like a Pro Dashboard) */
  .card-large { grid-column: span 8; height: 400px; }
  .card-small { grid-column: span 4; height: 400px; }
  .card-wide { grid-column: span 12; min-height: 200px; }

  h1, h2, h3 {
    font-weight: 600;
    letter-spacing: -0.03em;
  }

  .tag {
    background: rgba(255,255,255,0.1);
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    text-transform: uppercase;
    margin-bottom: 15px;
    display: inline-block;
  }

  /* CV BUTTON */
  .btn-cv {
    background: var(--text-main);
    color: #000;
    padding: 12px 25px;
    border-radius: 25px;
    text-decoration: none;
    font-weight: 600;
    display: inline-block;
    margin-top: 20px;
    transition: 0.3s;
  }

  .btn-cv:hover { background: var(--accent); color: #fff; }
</style>
</head>
<body>
    <header>
        <nav>
  <ul style="display: flex; gap: 30px; list-style: none; padding: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;">
    <li><a href="#sound" style="color: inherit; text-decoration: none;">Sound</a></li>
    <li><a href="#photo" style="color: inherit; text-decoration: none;">Photography</a></li>
    <li><a href="#about" style="color: inherit; text-decoration: none;">Bio & CV</a></li>
  </ul>
</nav>
        <div>
            <h1>ARASH IRANI</h1>
            <span class="subtitle">Sound Artist / Composer / Audio Engineer</span>
        </div>
        <span class="subtitle">Montreal, QC</span>
    </header>

    <div class="grid">
        <div class="card">
            <span class="tag">Sound Design</span>
            <h3>Atmospheric Space Ambience</h3>
            <p class="subtitle">High-fidelity 96kHz 24-bit soundscape for interactive media.</p>
            <iframe height="160" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/YOUR_ID&color=%23000000"></iframe>
        </div>
    </div>
    <script>
  async function loadSiteSettings() {
    try {
      const response = await fetch('/content/settings.json');
      const settings = await response.json();
      
      // 1. Update the Title
      document.title = settings.site_title || "Arash Irani - Sound Artist";
      
      // 2. Apply Colors to CSS Variables
      const root = document.documentElement;
      if (settings.bg_color) root.style.setProperty('--bg', settings.bg_color);
      if (settings.accent_color) root.style.setProperty('--accent', settings.accent_color);
      if (settings.text_color) root.style.setProperty('--text', settings.text_color);
      
      // 3. Inject Custom "Coding" from the Dashboard
      if (settings.custom_css) {
        const styleTag = document.createElement('style');
        styleTag.textContent = settings.custom_css;
        document.head.appendChild(styleTag);
      }
    } catch (e) {
      console.log("No settings found yet, using defaults.");
    }
  }
  loadSiteSettings();
</script>
</body>
</html>

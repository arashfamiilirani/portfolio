<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'arashfamiilirani/portfolio',
          branch: 'main',
          base_url: 'https://www.arashfamiilirani.com',
          auth_endpoint: 'https://gatekeeper-v2.vercel.app/api/auth'
        },
        media_folder: 'assets/img',
        public_folder: '/assets/img',
        collections: [
          {
            name: 'content',
            label: 'Website Content',
            files: [
              {
                name: 'home',
                label: 'Homepage (Yulia Mahr Style)',
                file: 'content/settings.json',
                fields: [
                  { label: "Site Name", name: "site_name", widget: "string" },
                  { label: "Main Heading (Massive Text)", name: "heading", widget: "string" },
                  { label: "Bio / Intro", name: "bio", widget: "markdown" },
                  {
                    label: "Portfolio Items",
                    name: "projects",
                    widget: "list",
                    fields: [
                      { label: "Title", name: "title", widget: "string" },
                      { label: "Video/Audio URL", name: "url", widget: "string" }
                    ]
                  }
                ]
              }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>

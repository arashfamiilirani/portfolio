<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arash Famili Irani | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <header class="py-16 px-6 text-center bg-white border-b border-gray-100">
        <h1 class="text-4xl font-bold tracking-tight">Arash Famili Irani</h1>
        <p class="mt-4 text-gray-500 max-w-2xl mx-auto italic">Artistic Portfolio & Sound Design</p>
    </header>

    <main id="portfolio-grid" class="max-w-6xl mx-auto p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
        </main>

    <footer class="text-center py-10 text-gray-400 text-sm">
        &copy; 2026 Arash Famili Irani
    </footer>

    <script>
        // This script fetches your data and puts it on the page
        fetch('./data.json')
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('portfolio-grid');
                data.projects.forEach(project => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow";
                    
                    let mediaHtml = '';
                    if (project.link) {
                        mediaHtml = `<a href="${project.link}" target="_blank" class="text-blue-600 font-medium hover:underline">View Media →</a>`;
                    } else if (project.file_upload) {
                        mediaHtml = `<audio controls class="w-full mt-4"><source src="${project.file_upload}"></audio>`;
                    }

                    card.innerHTML = `
                        <h3 class="text-xl font-semibold mb-2">${project.title}</h3>
                        <p class="text-gray-600 mb-4">${project.desc}</p>
                        ${mediaHtml}
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(err => console.log("Add your first project in the admin panel to see it here!"));

        // Redirect to admin after login
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>

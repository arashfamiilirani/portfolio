<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes" />
  <title>Admin Portal</title>
  <style>
    /* Larger editor text for readability */
    .decap-cms-widget-markdown textarea {
      font-size: 16px !important;
      line-height: 1.5 !important;
    }
    /* Bigger touch targets on mobile */
    @media (max-width: 768px) {
      .decap-cms-widget-list__item,
      .decap-cms-widget-object__field,
      .decap-cms-widget-string input,
      .decap-cms-widget-markdown button,
      .decap-cms-widget-select select {
        font-size: 16px !important;
        padding: 12px !important;
      }
      button, a, [role="button"] {
        min-height: 44px !important;
      }
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
  <script>
    // Optional dashboard card (responsive)
    CMS.registerDashboardCard({
      name: 'site-info',
      label: 'Site Overview',
      component: () => {
        return `
          <div style="padding: 20px; background: #f9f9f9; border-radius: 8px; margin-bottom: 20px;">
            <h2>Welcome to the Site Builder</h2>
            <p>Use the left menu to edit your site. Create custom tabs, upload a hero GIF or video, and manage your content.</p>
            <hr>
            <h3>Quick Links</h3>
            <ul>
              <li><a href="/" target="_blank">View Live Site</a></li>
              <li><a href="#/collections/pages/entries/home">Edit Main Page</a></li>
            </ul>
          </div>
        `;
      }
    });
  </script>
</body>
</html>

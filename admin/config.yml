backend:
  name: git-gateway
  branch: main # Double check if your GitHub branch is named 'main' or 'master'
  site_domain: arashfamiilirani.com # THIS IS THE FIX

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "projects"
    label: "My Portfolio"
    folder: "projects"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Media Link (YouTube/SoundCloud)", name: "embed", widget: "string", required: false}
      - {label: "Upload Audio/Video File", name: "file", widget: "file", required: false}

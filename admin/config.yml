backend:
  name: github
  repo: arashfamiilirani  # replace this
  branch: main

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "projects"
    label: "Projects"
    folder: "projects"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Media URL", name: "media_url", widget: "string"}
      - {label: "Thumbnail", name: "thumbnail", widget: "image"}

backend:
  name: github
  repo: arashfamiilirani/Portfolio
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

# This enables "Drafts" so you can preview before publishing
publish_mode: editorial_workflow

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "settings"
    label: "Site Design & Settings"
    delete: false # You don't want to delete your settings!
    editor:
      preview: false
    files:
      - name: "general"
        label: "Appearance"
        file: "content/settings.json"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string" }
          - { label: "Background Color", name: "bg_color", widget: "color" }
          - { label: "Accent Color", name: "accent_color", widget: "color" }
          - { label: "Text Color", name: "text_color", widget: "color" }

  - name: "portfolio"
    label: "My Sound Works"
    folder: "content/portfolio"
    create: true
    slug: "{{title}}"
    fields:
      - { label: "Project Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Sound Design", "Composition", "Audio Engineering"] }
      - { label: "Embed URL", name: "link", widget: "string", hint: "YouTube/SoundCloud src link" }
      - { label: "Description", name: "body", widget: "markdown" }

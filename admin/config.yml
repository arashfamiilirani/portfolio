backend:
  name: github
  repo: arashfamiilirani/portfolio
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "settings"
    label: "Site Builder"
    files:
      - name: "general"
        label: "Design & Content"
        file: "content/settings.json"
        fields:
          # --- DESIGN TOOLS (REPLACES CSS BOX) ---
          - { label: "1. Brand Name", name: "site_name", widget: "string", required: false }
          - { label: "2. Accent Color", name: "accent", widget: "color", default: "#f1f704", required: false }
          - { label: "3. Background Style", name: "bg_style", widget: "select", options: ["Pitch Black", "Midnight", "Studio Grey"], default: "Pitch Black", required: false }
          - { label: "4. Glass Blur Strength", name: "blur_strength", widget: "select", options: ["None", "Light", "Heavy"], default: "Light", required: false }
          - { label: "5. Corner Roundness", name: "roundness", widget: "select", options: ["Sharp", "Soft", "Apple Style"], default: "Apple Style", required: false }
          - { label: "6. Show Scanlines?", name: "show_scanlines", widget: "boolean", default: false, required: false }

          # --- MODULE BUILDER ---
          - label: "7. Page Sections (Add/Move/Remove)"
            name: "blocks"
            widget: "list"
            required: false
            types:
              - label: "Text/Bio Module"
                name: "text_block"
                fields:
                  - { label: "Title", name: "title", widget: "string", required: false }
                  - { label: "Content", name: "body", widget: "markdown", required: false }
                  - { label: "Width", name: "width", widget: "select", options: ["Small", "Medium", "Full"], default: "Medium" }
              
              - label: "Video/Audio Module"
                name: "video_block"
                fields:
                  - { label: "Title", name: "title", widget: "string", required: false }
                  - { label: "Embed URL", name: "url", widget: "string", hint: "YouTube or SoundCloud Link", required: false }
                  - { label: "Width", name: "width", widget: "select", options: ["Small", "Medium", "Full"], default: "Full" }

backend:
  name: github
  repo: arashfamiilirani/portfolio # Ensure this is your exact repo name
  branch: main

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "content"
    label: "Editorial Content"
    files:
      - name: "home"
        label: "Homepage (Yulia Mahr Style)"
        file: "content/settings.json"
        fields:
          - { label: "Site Header", name: "site_name", widget: "string" }
          - { label: "Massive Heading", name: "heading", widget: "string" }
          - { label: "Bio / Intro Text", name: "bio", widget: "markdown" }
          - label: "Work Portfolio"
            name: "projects"
            widget: "list"
            fields:
              - { label: "Title/Caption", name: "title", widget: "string" }
              - { label: "Media URL (YouTube/Vimeo/SoundCloud)", name: "url", widget: "string" }

backend:
  name: github
  repo: arashfamiilirani/portfolio
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "settings"
    label: "Site Editor"
    files:
      - name: "general"
        label: "Build Your Pages"
        file: "content/settings.json"
        fields:
          - { label: "Website Name", name: "site_name", widget: "string", default: "Arash Irani" }
          
          # THE MODULAR BUILDER
          - label: "Page Modules (Add text, videos, or galleries)"
            name: "modules"
            widget: "list"
            required: false
            types:
              # TOOL 1: THE TEXT FORMATTER
              - label: "Text & Typography Module"
                name: "text_module"
                fields:
                  - { label: "Menu Link Title (Optional)", name: "title", widget: "string", required: false }
                  - { label: "Content", name: "body", widget: "markdown", hint: "Use 'Rich Text' mode for Bold, Italics, Links, and Headings." }
                  - { label: "Module Width", name: "width", widget: "select", options: ["100% (Full Width)", "75% (Wide)", "50% (Half Page)"], default: "100% (Full Width)" }
                  - { label: "Text Alignment", name: "alignment", widget: "select", options: ["Left", "Center", "Right"], default: "Left" }
              
              # TOOL 2: UNLIMITED MEDIA GRID
              - label: "Media Gallery (Unlimited Videos/Audio)"
                name: "media_module"
                fields:
                  - { label: "Menu Link Title (Optional)", name: "title", widget: "string", required: false }
                  - { label: "Gallery Layout", name: "columns", widget: "select", options: ["1 Column (Massive)", "2 Columns (Grid)", "3 Columns (Compact)"], default: "2 Columns (Grid)" }
                  - label: "Add Videos / Audio Tracks"
                    name: "media_items"
                    widget: "list"
                    fields:
                      - { label: "Embed URL (YouTube, Vimeo, SoundCloud)", name: "url", widget: "string" }
                      - { label: "Caption (Optional)", name: "caption", widget: "string", required: false }

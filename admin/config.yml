backend:
  name: github
  repo: arashfamiilirani/portfolio
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

media_folder: "assets/img"
public_folder: "/assets/img"

editor:
  preview: false  # We're using our custom preview above, so we turn off the built-in split view

collections:
  - name: "pages"
    label: "Site Builder (Drag & Drop)"
    files:
      - name: "home"
        label: "Main Page"
        file: "content/settings.json"
        fields:
          - { label: "Site Name (Logo)", name: "site_name", widget: "string", hint: "This appears at the top of your site" }
          - label: "Page Sections"
            name: "modules"
            widget: "list"
            summary: '{{fields.type}}'
            types:
              - label: "Rich Text Block (like Google Docs)"
                name: "text_block"
                fields:
                  - { label: "Section Title (admin only)", name: "title", widget: "string", required: false, hint: "For your reference only" }
                  - label: "Content"
                    name: "body"
                    widget: "markdown"
                    default_view: "visual"
                    minimal: false
                    buttons: ["heading-one", "heading-two", "bold", "italic", "quote", "link", "bulleted-list"]
              
              - label: "Video (YouTube / Vimeo)"
                name: "video_block"
                fields:
                  - { label: "Video URL", name: "url", widget: "string", hint: "Paste the full embed URL or share link" }
                  - { label: "Caption (optional)", name: "caption", widget: "string", required: false }

              - label: "Audio / SoundCloud Grid"
                name: "audio_block"
                fields:
                  - label: "Tracks"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "SoundCloud Embed URL", name: "url", widget: "string", hint: "Example: https://w.soundcloud.com/player/?url=..." }
                      - { label: "Track Details (e.g., 96kHz 24-bit WAV)", name: "caption", widget: "string", required: false }

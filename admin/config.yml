backend:
  name: github
  repo: arashfamiilirani/portfolio
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "settings"
    label: "Site Editor"
    files:
      - name: "general"
        label: "Main Content"
        file: "content/settings.json"
        fields:
          - { label: "Your Name", name: "name", widget: "string", required: false }
          
          # SHOW/HIDE TOGGLES
          - { label: "Show Bio Section?", name: "show_bio", widget: "boolean", default: true }
          - { label: "Bio Text", name: "bio", widget: "text", required: false }
          
          - { label: "Show Video Section?", name: "show_video", widget: "boolean", default: false }
          - { label: "Video/Audio Embed Link", name: "video_url", widget: "string", required: false }
          
          - { label: "Accent Color", name: "accent", widget: "color", default: "#f1f704" }
          - { label: "Custom CSS", name: "css", widget: "code", required: false }

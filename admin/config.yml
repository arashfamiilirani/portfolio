backend:
  name: github
  repo: arashfamiilirani/portfolio
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

media_folder: "assets/img"
public_folder: "/assets/img"

editor:
  preview: false

collections:
  - name: "pages"
    label: "Site Builder"
    files:
      - name: "home"
        label: "Main Page"
        file: "content/settings.json"
        fields:
          - { label: "Site Name (Logo)", name: "site_name", widget: "string", default: "ARASH FAMIILIRANI" }
          - { label: "Home Button Label", name: "home_label", widget: "string", default: "Home" }

          # Hero image/video (full screen)
          - label: "Hero (Full Screen)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Image or Video", name: "type", widget: "select", options: ["image", "video"], default: "image" }
              - { label: "Image", name: "image", widget: "image", required: false, hint: "If type is image" }
              - { label: "Video URL (MP4 embed)", name: "video", widget: "string", required: false, hint: "If type is video, paste direct MP4 URL" }
              - { label: "Credit (optional)", name: "credit", widget: "string", required: false }

          # Theme
          - label: "Theme"
            name: "theme"
            widget: "object"
            fields:
              - { label: "Background Color", name: "bg", widget: "color", default: "#ffffff" }
              - { label: "Text Color", name: "text", widget: "color", default: "#111111" }
              - { label: "Accent Color", name: "accent", widget: "color", default: "#000000" }
              - { label: "Heading Font", name: "heading_font", widget: "select", options: ["Cormorant Garamond, serif", "Georgia, serif", "Playfair Display, serif", "Inter, sans-serif"], default: "Cormorant Garamond, serif" }
              - { label: "Body Font", name: "body_font", widget: "select", options: ["Inter, sans-serif", "Helvetica, sans-serif", "Open Sans, sans-serif"], default: "Inter, sans-serif" }
              - { label: "Heading Size (e.g., 4.5rem)", name: "heading_size", widget: "string", default: "4.5rem" }

          # Social links (header icons)
          - label: "Social Links"
            name: "social_links"
            widget: "object"
            fields:
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
              - { label: "YouTube URL", name: "youtube", widget: "string", required: false }
              - { label: "SoundCloud URL", name: "soundcloud", widget: "string", required: false }
              - { label: "Spotify URL", name: "spotify", widget: "string", required: false }
              - { label: "Email", name: "email", widget: "string", required: false }

          # Page sections (tabs)
          - label: "Sections (tabs)"
            name: "sections"
            widget: "list"
            summary: '{{fields.title}} ({{fields.type}})'
            types:
              - label: "Bio / CV"
                name: "bio"
                fields:
                  - { label: "Tab Title", name: "title", widget: "string", default: "Bio / CV" }
                  - { label: "Content", name: "body", widget: "markdown", default_view: "visual" }

              - label: "Video Reel"
                name: "video_reel"
                fields:
                  - { label: "Tab Title", name: "title", widget: "string", default: "Video Reels" }
                  - label: "Videos"
                    name: "videos"
                    widget: "list"
                    fields:
                      - { label: "Embed URL (YouTube/Vimeo)", name: "url", widget: "string" }
                      - { label: "Caption", name: "caption", widget: "string", required: false }

              - label: "Music"
                name: "music"
                fields:
                  - { label: "Tab Title", name: "title", widget: "string", default: "Music" }
                  - label: "Tracks"
                    name: "tracks"
                    widget: "list"
                    fields:
                      - { label: "Embed URL (SoundCloud/Spotify)", name: "url", widget: "string" }
                      - { label: "Details", name: "caption", widget: "string", required: false }

              - label: "Sound Design"
                name: "sound_design"
                fields:
                  - { label: "Tab Title", name: "title", widget: "string", default: "Sound Design" }
                  - label: "Tracks"
                    name: "tracks"
                    widget: "list"
                    fields:
                      - { label: "Embed URL", name: "url", widget: "string" }
                      - { label: "Details", name: "caption", widget: "string", required: false }

              # NEW: Contact section – displays contact form (no email exposed)
              - label: "Contact"
                name: "contact"
                fields:
                  - { label: "Tab Title", name: "title", widget: "string", default: "Contact" }
                  - { label: "Intro Text (optional)", name: "text", widget: "markdown", required: false }

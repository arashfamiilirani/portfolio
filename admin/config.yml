backend:
  name: git-gateway
  branch: main # Double check if your branch is named 'main' or 'master'

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "projects"
    label: "My Portfolio"
    folder: "projects" # This will create a 'projects' folder in your GitHub
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "body", widget: "markdown"}
      - {label: "Link", name: "link", widget: "string", required: false}
      - {label: "Upload File", name: "file", widget: "file", required: false}

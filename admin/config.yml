backend:
  name: git-gateway
  branch: main # Or master, depending on what your main GitHub branch is called

media_folder: "uploads" # Where your audio and video files will be saved in GitHub
public_folder: "/uploads"

collections:
  - name: "projects"
    label: "Portfolio Projects"
    folder: "content/projects"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Project Title", name: "title", widget: "string"}
      - {label: "Description", name: "body", widget: "markdown"}
      - {label: "YouTube Link", name: "youtube_url", widget: "string", required: false}
      - {label: "SoundCloud Link", name: "soundcloud_url", widget: "string", required: false}
      - {label: "Instagram Link", name: "instagram_url", widget: "string", required: false}
      - {label: "Audio/Video Upload", name: "media_file", widget: "file", required: false}

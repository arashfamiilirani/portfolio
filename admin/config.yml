backend:
  name: github
  repo: arashfamiilirani/portfolio
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

# This allows you to save drafts and preview before the public sees them
publish_mode: editorial_workflow

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "settings"
    label: "Site Appearance"
    files:
      - name: "general"
        label: "Branding & Colors"
        file: "content/settings.json"
        fields:
          - { label: "Accent Color", name: "accent", widget: "color" }
          - { label: "Custom CSS", name: "css", widget: "code", default_language: "css" }

  - name: "portfolio"
    label: "My Sound Works"
    folder: "content/portfolio"
    create: true
    slug: "{{title}}"
    fields:
      - { label: "Project Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Sound Design", "Composition", "Audio Engineering"] }
      - { label: "Embed URL", name: "link", widget: "string", hint: "YouTube/SoundCloud embed URL" }
      - { label: "Description", name: "body", widget: "markdown" }

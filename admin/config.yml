backend:
  name: github
  repo: arashfamiilirani
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: api/auth
  site_domain: www.arashfamiilirani.com
publish_mode: simple # Add this line
show_preview_links: false # Add this line to stop "appendChild" errors

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "portfolio"
    label: "My Sound Works"
    folder: "content/portfolio"
    create: true
    slug: "{{title}}"
    fields:
      - { label: "Project Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Sound Design", "Composition", "Audio Engineering"] }
      - { label: "Media Link (SoundCloud or YouTube)", name: "link", widget: "string" }
      - { label: "Short Description", name: "body", widget: "markdown" }

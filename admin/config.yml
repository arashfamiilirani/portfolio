backend:
  name: github
  repo: arashfamiilirani/portfolio
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "pages"
    label: "Editorial Content"
    files:
      - name: "home"
        label: "Home Page"
        file: "content/settings.json"
        fields:
          - { label: "Site Logo Name", name: "site_name", widget: "string" }
          - label: "Page Modules"
            name: "modules"
            widget: "list"
            summary: '{{fields.type}}'
            types:
              - label: "Text / About (Editorial)"
                name: "about_module"
                fields:
                  - { label: "Headline", name: "title", widget: "string" }
                  - label: "Body Copy"
                    name: "body"
                    widget: "markdown"
                    # This enables the advanced editor tools
                    minimal: false
                    buttons: ["heading-one", "heading-two", "italic", "bold", "link", "quote", "bulleted-list"]
              
              - label: "Video Gallery"
                name: "video_module"
                fields:
                  - { label: "Columns", name: "cols", widget: "select", options: ["1", "2"], default: "1" }
                  - label: "Items"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Vimeo/YT Embed URL", name: "url", widget: "string" }
                      - { label: "Caption", name: "caption", widget: "string", required: false }

              - label: "Audio / Sound Design"
                name: "audio_module"
                fields:
                  - label: "Tracks"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "SoundCloud/Spotify Link", name: "url", widget: "string" }
                      - { label: "Title", name: "title", widget: "string" }

              - label: "Socials & Contact"
                name: "contact_module"
                fields:
                  - { label: "Email", name: "email", widget: "string" }
                  - { label: "Instagram Link", name: "insta", widget: "string" }

backend:
  name: github
  repo: arashfamiilirani/Portfolio
  branch: main

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "projects"
    label: "Projects"
    folder: "projects"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Media URL", name: "media_url", widget: "string" }

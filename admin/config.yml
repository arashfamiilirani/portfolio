backend:
  name: github
  repo: arashfamiilirani/Portfolio # Keeping the capital P as we found earlier
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

publish_mode: editorial_workflow
media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  # SECTION 1: SOUND DESIGN & COMPOSITION
  - name: "audio_works"
    label: "Audio Portfolio (Design & Music)"
    folder: "content/audio"
    create: true
    slug: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Sound Design", "Composition", "Game Audio"] }
      - { label: "Embed Link", name: "link", widget: "string", hint: "YouTube/SoundCloud URL" }
      - { label: "Description", name: "body", widget: "markdown" }

  # SECTION 2: PHOTOGRAPHY & VISUALS
  - name: "photography"
    label: "Photography / Visuals"
    folder: "content/photography"
    create: true
    slug: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Featured Image", name: "image", widget: "image" }
      - { label: "Caption", name: "body", widget: "text" }

  # SECTION 3: BIO & CV
  - name: "pages"
    label: "Pages (Bio & CV)"
    files:
      - name: "about"
        label: "Bio & CV"
        file: "content/about.json"
        fields:
          - { label: "Full Name", name: "name", widget: "string" }
          - { label: "Professional Bio", name: "bio", widget: "markdown" }
          - { label: "Upload CV (PDF)", name: "cv_file", widget: "file" }
          - { label: "Contact Email", name: "email", widget: "string" }

  # SECTION 4: GLOBAL DESIGN
  - name: "settings"
    label: "Site Appearance"
    files:
      - name: "general"
        label: "Branding & Colors"
        file: "content/settings.json"
        fields:
          - { label: "Accent Color", name: "accent", widget: "color" }
          - { label: "Custom CSS", name: "css", widget: "code", default_language: "css" }
